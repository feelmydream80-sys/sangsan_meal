<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#070709">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="상산급식">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>상산고 급식 영양 분석</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root{--bg:#070709;--surface:rgba(255,255,255,.04);--border:rgba(255,255,255,.08);--text:#efefef;--muted:rgba(255,255,255,.4);--green:#4fffb0;--blue:#7eb8ff;--yellow:#ffd60a;--red:#ff6b6b;--orange:#ff9f43;--purple:#c77dff;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
    .grid{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0;}
    .orb{position:fixed;border-radius:50%;filter:blur(150px);opacity:.07;pointer-events:none;z-index:0;}
    #o1{width:500px;height:500px;top:-150px;left:-150px;background:var(--green);}
    #o2{width:400px;height:400px;bottom:-150px;right:-150px;background:var(--blue);}
    nav{position:sticky;top:0;z-index:100;background:rgba(7,7,9,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;}
    .nav-logo{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.2em;color:var(--muted);display:flex;align-items:center;gap:8px;}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);}
    .config-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .config-btn:hover{color:var(--text);}
    main{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:24px 16px 80px;}
    .tabs{display:flex;gap:4px;margin-bottom:24px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:4px;}
    .tab{flex:1;padding:10px 6px;border-radius:7px;border:none;background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
    .tab.on{background:rgba(255,255,255,.08);color:var(--text);}
    .date-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
    .date-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;}
    .date-btn:hover{color:var(--text);}
    .date-input{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;flex:1;outline:none;}
    .date-input:focus{border-color:var(--green);}
    .card{background:rgba(10,10,14,.9);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;position:relative;overflow:hidden;}
    .card-shine{position:absolute;top:0;left:24px;right:24px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
    .meal-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:4px 12px;border-radius:4px;border:1px solid;}
    .menu-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
    .menu-item{padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);font-size:12px;font-weight:300;}
    .menu-item.aw{background:rgba(255,107,107,.1);border-color:rgba(255,107,107,.3);color:var(--red);}
    .menu-item.aw::after{content:' ⚠️';}
    .ntr-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
    .ntr-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
    .ntr-name{font-size:11px;color:var(--muted);width:60px;flex-shrink:0;}
    .ntr-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
    .ntr-bar{height:100%;border-radius:3px;}
    .ntr-val{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:80px;text-align:right;flex-shrink:0;}
    .month-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
    .month-btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all .2s;}
    .month-btn:hover{color:var(--text);}
    .month-display{flex:1;text-align:center;font-family:'Space Mono',monospace;font-size:13px;}
    .load-btn{padding:10px 20px;border-radius:8px;background:var(--green);color:#000;border:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;font-weight:700;cursor:pointer;transition:all .2s;text-transform:uppercase;}
    .load-btn:hover{filter:brightness(1.1);}
    .load-btn:disabled{opacity:.4;cursor:default;}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:16px;}
    .stat-card{background:rgba(10,10,14,.9);border:1px solid var(--border);border-radius:14px;padding:20px;}
    .stat-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;}
    .stat-value{font-size:26px;font-weight:900;line-height:1;}
    .stat-unit{font-size:12px;font-weight:300;margin-left:3px;}
    .stat-sub{font-size:11px;color:var(--muted);font-weight:300;margin-top:6px;}
    .chart-card{background:rgba(10,10,14,.9);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
    .chart-title{font-size:15px;font-weight:700;margin-bottom:4px;}
    .chart-sub{font-size:12px;color:var(--muted);font-weight:300;margin-bottom:20px;}
    .chart-wrap{position:relative;height:240px;}
    .ntr-freq-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
    .freq-item{padding:14px 16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;}
    .freq-name{font-size:12px;font-weight:700;margin-bottom:6px;}
    .freq-bar-row{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
    .freq-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
    .freq-bar-fill{height:100%;border-radius:3px;}
    .freq-pct{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);width:36px;text-align:right;}
    .fbadge{display:inline-block;padding:2px 8px;border-radius:3px;font-family:'Space Mono',monospace;font-size:9px;}
    .fover{background:rgba(255,107,107,.1);color:var(--red);border:1px solid rgba(255,107,107,.2);}
    .flow{background:rgba(255,159,67,.1);color:var(--orange);border:1px solid rgba(255,159,67,.2);}
    .fok{background:rgba(79,255,176,.1);color:var(--green);border:1px solid rgba(79,255,176,.2);}
    .allergy-section{background:rgba(10,10,14,.9);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:16px;}
    .allergy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
    .allergy-chip{padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;text-align:left;width:100%;}
    .allergy-chip.selected{border-color:rgba(255,107,107,.4);background:rgba(255,107,107,.08);color:var(--red);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(10px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;}
    .modal{background:rgba(10,10,14,.98);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;width:100%;}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:20px;}
    .modal-row{margin-bottom:16px;}
    .modal-label{font-size:11px;color:var(--muted);margin-bottom:6px;}
    .modal-input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;outline:none;}
    .modal-input:focus{border-color:var(--green);}
    .school-select{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:12px;margin-bottom:12px;}
    .school-search-wrap{position:relative;flex:1;max-width:200px}
    .school-search-input{width:100%;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:10px;outline:none;}
    .school-search-input:focus{border-color:var(--green);}
    .school-search-input::placeholder{color:var(--muted)}
    .autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:rgba(14,14,18,.98);border:1px solid var(--border);border-radius:8px;max-height:200px;overflow-y:auto;z-index:1000;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
    .autocomplete-dropdown.on{display:block}
    .autocomplete-item{padding:10px 14px;cursor:pointer;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
    .autocomplete-item:hover{background:rgba(255,255,255,.05)}
    .autocomplete-empty{padding:12px;text-align:center;color:var(--muted);font-size:11px}
    .autocomplete-loading{padding:12px;text-align:center;color:var(--muted);font-size:11px}
    .modal-note{font-size:10px;color:var(--muted);margin-top:16px;text-align:center;}
    .modal-btn{width:100%;padding:12px;border-radius:8px;background:var(--green);color:#000;border:none;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;font-weight:700;cursor:pointer;text-transform:uppercase}
    .empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;}
    .loading-wrap{display:flex;justify-content:center;padding:40px;}
    .spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sum-tabs{display:flex;gap:4px;margin-bottom:16px;}
    .sum-tab{padding:8px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;cursor:pointer;}
    .sum-tab.on{background:var(--green);color:#000;border-color:var(--green);}
    .sum-cal{font-size:28px;font-weight:900;margin-bottom:16px;}
    .btn-export{padding:6px 12px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:10px;cursor:pointer;}
    .btn-export:hover{color:var(--text);}
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="orb" id="o1"></div>
  <div class="orb" id="o2"></div>

  <div id="modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-title">⚙ 설정</div>
      <div class="modal-row">
        <div class="modal-label">NEIS API 키</div>
        <input class="modal-input" id="ni">
      </div>
      <div class="modal-row">
        <div class="modal-label">Claude API 키 (선택)</div>
        <input class="modal-input" id="ci">
      </div>
      <div class="modal-row">
        <div class="modal-label">현재 학교: <span id="currentSchoolName"></span></div>
      </div>
      <button class="modal-btn" onclick="saveKeys()">저장하고 시작하기</button>
      <button style="width:100%;margin-top:8px;padding:10px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:10px;color:var(--red);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer" onclick="doClearCache()">🗑 캐시 지우기</button>
      <div class="modal-note">API 키와 학교 정보는 localStorage에만 저장됩니다.</div>
    </div>
  </div>

  <nav>
    <div class="nav-logo"><div class="nav-dot"></div>상산고 급식 분석</div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="navSido" onchange="onNavSidoChange()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;padding:4px 6px;border-radius:4px;cursor:pointer;max-width:90px">
        <option value="">시·도</option>
      </select>
      <select id="navLevel" onchange="onNavLevelChange()" style="background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;padding:4px 6px;border-radius:4px;cursor:pointer;max-width:70px">
        <option value="">학교급</option>
        <option value="초등학교">초</option>
        <option value="중학교">중</option>
        <option value="고등학교">고</option>
      </select>
      <div class="school-search-wrap">
        <input type="text" id="navSchoolSearch" class="school-search-input" placeholder="학교명 검색" autocomplete="off">
        <div id="navAutocomplete" class="autocomplete-dropdown"></div>
      </div>
    </div>
    <button class="config-btn" onclick="showModal()">⚙ 설정</button>
  </nav>

  <main>
    <div class="tabs">
      <button class="tab on" onclick="sw('today',this)">오늘 급식</button>
      <button class="tab" onclick="sw('stats',this)">월간 통계</button>
      <button class="tab" onclick="sw('allergy',this)">알레르기</button>
    </div>

    <div id="tab-today">
      <div class="date-row">
        <button class="date-btn" onclick="cd(-1)">← 전날</button>
        <input class="date-input" type="date" id="dp" onchange="loadToday()">
        <button class="date-btn" onclick="cd(1)">다음날 →</button>
      </div>
      <div id="today-box"><div class="loading-wrap"><div class="spinner"></div></div></div>
    </div>

    <div id="tab-stats" style="display:none">
      <div class="month-row">
        <button class="month-btn" onclick="cm(-1)">← 이전달</button>
        <div class="month-display" id="md"></div>
        <button class="month-btn" onclick="cm(1)">다음달 →</button>
        <button class="load-btn" id="slb" onclick="loadStats()">분석 시작</button>
        <button class="load-btn" id="mlb" onclick="exportMonthly()" style="display:none;background:var(--blue)">📥 내보내기</button>
      </div>
      <div id="stats-box"><div class="empty">월을 선택하고 "분석 시작"을 눌러주세요.</div></div>
    </div>

    <div id="tab-allergy" style="display:none">
      <div class="allergy-section">
        <div style="font-size:14px;font-weight:700;margin-bottom:4px">내 알레르기 설정</div>
        <div style="font-size:12px;color:var(--muted);font-weight:300;margin-bottom:16px">선택하면 급식 메뉴에 경고 표시가 나타납니다</div>
        <div class="allergy-grid" id="ag"></div>
      </div>
    </div>
  </main>

  <script>
const NEIS_BASE = 'https://open.neis.go.kr/hub';
const DEFAULT_NEIS_KEY = '35b75a10a2fe426b8aa1b072ab2be207';
const SIDO_LIST = [
  {code:'B10',name:'서울특별시'},{code:'C10',name:'부산광역시'},{code:'D10',name:'대구광역시'},
  {code:'E10',name:'인천광역시'},{code:'F10',name:'광주광역시'},{code:'G10',name:'대전광역시'},
  {code:'H10',name:'울산광역시'},{code:'I10',name:'세종특별자치시'},{code:'J10',name:'경기도'},
  {code:'K10',name:'강원도'},{code:'L10',name:'충청북도'},{code:'M10',name:'충청남도'},
  {code:'N10',name:'전라북도'},{code:'O10',name:'전라남도'},{code:'P10',name:'전북특별자치도'},
  {code:'Q10',name:'경상남도'},{code:'R10',name:'제주특별자치도'}
];
const DEFAULT_SCHOOL = {ATPT:'P10',CODE:'8321090',NAME:'상산고등학교'};
let NK = '', CK = '', MA = [], SY = 2026, SM = 4, CHARTS = {}, currentSchool = {...DEFAULT_SCHOOL};

const DRI = {
  '탄수화물(g)':{rec:350,color:'#7eb8ff'},'단백질(g)':{rec:65,color:'#4fffb0'},
  '지방(g)':{rec:75,color:'#ffd60a'},'칼슘(mg)':{rec:900,color:'#ff9f43'},
  '철분(mg)':{rec:14,color:'#c77dff'},'비타민C(mg)':{rec:100,color:'#ff6b9d'}
};
const MEAL_RATIO = {'조식':0.35,'중식':1.0,'석식':1.0};
const MC = {'조식':'#ff9f43','중식':'#4fffb0','석식':'#7eb8ff'};
const PALETTE = ['#4fffb0','#7eb8ff','#ffd60a','#ff6b6b','#ff9f43','#c77dff','#ff6b9d','#48dbfb'];
const AM = {1:'난류',2:'우유',3:'메밀',4:'땅콩',5:'대두',6:'밀',7:'고등어',8:'게',9:'새우(김치)',10:'돼지고기',11:'복숭아',12:'토마토',13:'아황산류',14:'호두',15:'닭고기',16:'쇠고기',17:'오징어',18:'조개류'};

let db = null;
const DB_NAME = 'sangsan-meal-cache', DB_VERSION = 1, STORE_NAME = 'meals';
function openDB() {
  return new Promise((resolve,reject)=>{
    const r = indexedDB.open(DB_NAME, DB_VERSION);
    r.onerror = () => reject(r.error);
    r.onsuccess = () => { db = r.result; resolve(db); };
    r.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(STORE_NAME)) d.createObjectStore(STORE_NAME, {keyPath:'id'});
    };
  });
}
async function saveMealCache(key, data) {
  if (!db) await openDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).put({id:key, data:data, time:Date.now()});
  return new Promise((resolve,reject)=>{tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);});
}
async function loadMealCache(key) {
  if (!db) await openDB();
  const tx = db.transaction(STORE_NAME, 'readonly');
  const req = tx.objectStore(STORE_NAME).get(key);
  return new Promise((resolve,reject)=>{req.onsuccess = () => resolve(req.result); req.onerror = () => reject(req.error);});
}
async function clearMealCache() {
  if (!db) await openDB();
  const tx = db.transaction(STORE_NAME, 'readwrite');
  tx.objectStore(STORE_NAME).clear();
  return new Promise((resolve,reject)=>{tx.oncomplete = resolve; tx.onerror = () => reject(tx.error);});
}
function makeCacheKey(from, to, school) { return `${school.ATPT}_${school.CODE}_${from}_${to}`; }

function fd(d,s) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return s ? `${y}${s}${m}${s}${dd}` : `${y}${m}${dd}`;
}
function cd(n) {
  const c = new Date(document.getElementById('dp').value);
  c.setDate(c.getDate() + n);
  document.getElementById('dp').value = fd(c, '-');
  loadToday();
}
function cm(n) {
  SM += n;
  if (SM > 12) { SM = 1; SY++; }
  if (SM < 1) { SM = 12; SY--; }
  updMD();
}
function updMD() { document.getElementById('md').textContent = `${SY}년 ${String(SM).padStart(2,'0')}월`; }

async function fetchRange(f, t) {
  const cacheKey = makeCacheKey(f, t, currentSchool);
  try {
    const cached = await loadMealCache(cacheKey);
    if (cached && cached.data) { console.log('캐시 히트:', cacheKey); return cached.data; }
  } catch(e) { console.warn('캐시 로드 실패:', e.message); }
  
  const allRows = [];
  const start = new Date(f.slice(0,4)+'-'+f.slice(4,6)+'-'+f.slice(6,8));
  const end = new Date(t.slice(0,4)+'-'+t.slice(4,6)+'-'+t.slice(6,8));
  let cur = new Date(start);
  
  while (cur <= end) {
    const chunkFrom = fd(cur);
    const chunkEnd = new Date(cur);
    chunkEnd.setDate(chunkEnd.getDate() + 6);
    const chunkTo = fd(chunkEnd > end ? end : chunkEnd);
    
    try {
      const url = `${NEIS_BASE}/mealServiceDietInfo?KEY=${NK}&Type=json&pIndex=1&pSize=50&ATPT_OFCDC_SC_CODE=${currentSchool.ATPT}&SD_SCHUL_CODE=${currentSchool.CODE}&MLSV_FROM_YMD=${chunkFrom}&MLSV_TO_YMD=${chunkTo}`;
      const res = await fetch(url);
      const j = await res.json();
      const rows = j.mealServiceDietInfo?.[1]?.row || [];
      allRows.push(...rows);
    } catch(e) { console.warn(`${chunkFrom}~${chunkTo} 실패:`, e.message); }
    
    cur.setDate(cur.getDate() + 7);
  }
  
  if (allRows.length > 0) {
    try { await saveMealCache(cacheKey, allRows); console.log('캐시 저장:', cacheKey); }
    catch(e) { console.warn('캐시 저장 실패:', e.message); }
  }
  return allRows;
}

function pNtr(s) {
  const r = {};
  (s || '').split('\n').forEach(x => {
    const [k, v] = x.split(':').map(a => a.trim());
    if (k && v) r[k] = parseFloat(v) || 0;
  });
  return r;
}
function pDish(s) {
  return s.split('\n').filter(Boolean).map(d => {
    const name = d.replace(/\s*\([\d\.]+\)/g, '').trim();
    const nums = (d.match(/\(([\d\.]+)\)/g) || []).flatMap(m => m.replace(/[()]/g, '').split('.').map(Number));
    return {name, nums};
  });
}
function getMealRec(key, mealName) { return DRI[key].rec * (MEAL_RATIO[mealName] || 1.0); }

async function loadToday() {
  const dv = document.getElementById('dp').value.replace(/-/g, '');
  const box = document.getElementById('today-box');
  box.innerHTML = '<div class="loading-wrap"><div class="spinner"></div></div>';
  
  try {
    const rows = await fetchRange(dv, dv);
    if (!rows.length) { box.innerHTML = '<div class="empty">📭 급식 정보가 없습니다.<br>주말이거나 방학일 수 있어요.</div>'; return; }
    
    const totalNtr = {};
    Object.keys(DRI).forEach(k => totalNtr[k] = 0);
    let totalCal = 0;
    rows.forEach(r => {
      totalCal += parseFloat(r.CAL_INFO) || 0;
      const n = pNtr(r.NTR_INFO);
      Object.keys(DRI).forEach(k => totalNtr[k] += (n[k] || 0));
    });
    
    const mealNames = rows.map(r => r.MMEAL_SC_NM);
    const hasBrk = mealNames.includes('조식');
    const mealList = mealNames.join(' · ');
    
    function calcSummary(mode) {
      let cal = 0, ntr = {};
      Object.keys(DRI).forEach(k => ntr[k] = 0);
      rows.forEach(r => {
        const ratio = (mode === 'lunchDinner' && r.MMEAL_SC_NM === '조식') ? 0 : 1;
        if (ratio === 0) return;
        cal += parseFloat(r.CAL_INFO) || 0;
        const n = pNtr(r.NTR_INFO);
        Object.keys(DRI).forEach(k => ntr[k] += (n[k] || 0));
      });
      return {cal, ntr};
    }
    
    function renderSummary(mode) {
      const {cal, ntr} = calcSummary(mode);
      const labels = {all:'전체 (조식+중식+석식)', lunchDinner:'중식+석식만', brk35:'조식35%+중식+석식'};
      const html = Object.entries(DRI).map(([k, i]) => {
        const v = Math.round(ntr[k]);
        const pct = Math.min(v / i.rec * 100, 100);
        const rt = Math.round(v / i.rec * 100);
        const rc = rt > 120 ? '#ff6b6b' : rt < 60 ? '#ff9f43' : '#4fffb0';
        return `<div class="ntr-row"><div class="ntr-name">${k.replace(/\(.*?\)/, '')}</div><div class="ntr-bar-wrap"><div class="ntr-bar" style="width:${pct}%;background:${i.color}"></div></div><div class="ntr-val">${v}${rt}%</div></div>`;
      }).join('');
      return {cal, html};
    }
    
    const defaultMode = hasBrk ? 'brk35' : 'lunchDinner';
    const def = renderSummary(defaultMode);
    
    box.innerHTML = `
      <div class="card">
        <div class="card-header">
          <span class="meal-badge" style="border-color:var(--green);color:var(--green)">일일 합산</span>
          <button class="btn-export" onclick="exportDaily()">📥 내보내기</button>
        </div>
        <div class="sum-cal" style="color:var(--yellow)">${Math.round(def.cal).toLocaleString()} Kcal / 2,600 권장</div>
        <div class="sum-tabs">
          <button class="sum-tab ${defaultMode==='all'?'on':''}" onclick="switchSum('all',this)">전체</button>
          <button class="sum-tab ${defaultMode==='lunchDinner'?'on':''}" onclick="switchSum('lunchDinner',this)">중식+석식</button>
          <button class="sum-tab ${defaultMode==='brk35'?'on':''}" onclick="switchSum('brk35',this)">조식35%</button>
        </div>
        <div id="sumNtr">${def.html}</div>
      </div>
      ${rows.map(r => {
        const ac = MC[r.MMEAL_SC_NM] || '#fff';
        const dishes = pDish(r.DDISH_NM);
        const ntr = pNtr(r.NTR_INFO);
        const mHTML = dishes.map(d => `<span class="menu-item${d.nums.some(n=>MA.includes(n))?' aw':''}">${d.name}</span>`).join('');
        const nHTML = Object.entries(DRI).map(([k, i]) => {
          const v = ntr[k] || 0;
          const rec = getMealRec(k, r.MMEAL_SC_NM);
          const pct = Math.min(v / rec * 100, 100);
          const rt = Math.round(v / rec * 100);
          const rc = rt > 120 ? '#ff6b6b' : rt < 60 ? '#ff9f43' : '#4fffb0';
          return `<div class="ntr-row"><div class="ntr-name">${k.replace(/\(.*?\)/, '')}</div><div class="ntr-bar-wrap"><div class="ntr-bar" style="width:${pct}%;background:${rc}"></div></div><div class="ntr-val">${v}${rt}%</div></div>`;
        }).join('');
        return `<div class="card"><div class="card-header"><span class="meal-badge" style="border-color:${ac};color:${ac}">${r.MMEAL_SC_NM}</span><span style="font-family:'Space Mono';font-size:11px">${r.CAL_INFO} Kcal</span></div><div class="menu-list">${mHTML}</div><div class="ntr-label">${r.MMEAL_SC_NM==='조식'?'영양소 — 조식 기준 (1일 권장량의 35%)':'영양소 — 1일 권장량 대비 %'}</div>${nHTML}</div>`;
      }).join('')}
    `;
    
    window._sumData = {rows};
    window.switchSum = function(mode, btn) {
      document.querySelectorAll('.sum-tab').forEach(t => t.classList.remove('on'));
      btn.classList.add('on');
      const {html} = renderSummary(mode);
      document.getElementById('sumNtr').innerHTML = html;
    };
  } catch(e) {
    box.innerHTML = `<div class="empty">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  }
}

async function loadStats() {
  const btn = document.getElementById('slb');
  btn.disabled = true; btn.textContent = '분석 중...';
  const box = document.getElementById('stats-box');
  box.innerHTML = `<div class="empty">${SY}년 ${SM}월 데이터 분석 중...</div>`;
  
  const from = `${SY}${String(SM).padStart(2,'0')}01`;
  const last = new Date(SY, SM, 0).getDate();
  const to = `${SY}${String(SM).padStart(2,'0')}${last}`;
  
  try {
    const rows = await fetchRange(from, to);
    if (!rows.length) { box.innerHTML = '<div class="empty">📭 해당 월의 급식 정보가 없습니다.</div>'; document.getElementById('slb').style.display='inline-block'; return; }
    
    const byDate = {};
    rows.forEach(r => { if (!byDate[r.MLSV_YMD]) byDate[r.MLSV_YMD] = []; byDate[r.MLSV_YMD].push(r); });
    const dates = Object.keys(byDate).sort();
    const calByDate = dates.map(d => ({date:d, cal:byDate[d].reduce((s,r) => s + parseFloat(r.CAL_INFO||0), 0)}));
    const avgCal = Math.round(calByDate.reduce((s,d) => s + d.cal, 0) / calByDate.length);
    
    const ntrSums = {}, ntrOver = {}, ntrLow = {};
    Object.keys(DRI).forEach(k => { ntrSums[k] = 0; ntrOver[k] = 0; ntrLow[k] = 0; });
    dates.forEach(d => {
      const dn = {};
      Object.keys(DRI).forEach(k => dn[k] = 0);
      byDate[d].forEach(r => { const n = pNtr(r.NTR_INFO); Object.keys(DRI).forEach(k => dn[k] += (n[k] || 0)); });
      Object.keys(DRI).forEach(k => {
        ntrSums[k] += dn[k];
        const ratio = dn[k] / DRI[k].rec;
        if (ratio > 1.2) ntrOver[k]++;
        else if (ratio < 0.7) ntrLow[k]++;
      });
    });
    const ntrAvgs = {};
    Object.keys(DRI).forEach(k => ntrAvgs[k] = Math.round(ntrSums[k] / dates.length));
    
    const ac = {};
    rows.forEach(r => pDish(r.DDISH_NM).forEach(d => d.nums.forEach(n => { ac[n] = (ac[n] || 0) + 1; })));
    
    box.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-label">하루 평균 칼로리</div><div class="stat-value" style="color:var(--yellow)">${avgCal.toLocaleString()}<span class="stat-unit">Kcal</span></div><div class="stat-sub">분석 ${dates.length}일 / ${rows.length}끼</div></div>
        <div class="stat-card"><div class="stat-label">평균 단백질</div><div class="stat-value" style="color:var(--blue)">${ntrAvgs['단백질(g)']}<span class="stat-unit">g</span></div><div class="stat-sub">권장 ${DRI['단백질(g)'].rec}g 기준</div></div>
        <div class="stat-card"><div class="stat-label">평균 칼슘</div><div class="stat-value" style="color:var(--orange)">${ntrAvgs['칼슘(mg)']}<span class="stat-unit">mg</span></div><div class="stat-sub">권장 ${DRI['칼슘(mg)'].rec}mg 기준</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📈 일별 칼로리 트렌드</div>
        <div class="chart-sub">하루 총 칼로리 (점선: 고1 권장 2,600Kcal)</div>
        <div class="chart-wrap"><canvas id="cc"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">⚖️ 영양소 부족·과잉 빈도</div>
        <div class="chart-sub">${dates.length}일 중</div>
        <div class="ntr-freq-grid" id="nfd">${Object.entries(DRI).map(([k,i]) => {
          const avg = ntrAvgs[k], rt = Math.round(avg / i.rec * 100), ov = ntrOver[k], lw = ntrLow[k];
          const bc = rt > 120 ? 'fover' : rt < 70 ? 'flow' : 'fok';
          const bt = rt > 120 ? `과잉 ${ov}일` : rt < 70 ? `부족 ${lw}일` : '양호';
          return `<div class="freq-item"><div class="freq-name">${k.replace(/\(.*?\)/, '')}</div><div class="freq-bar-row"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:${Math.min(rt,100)}%;background:${i.color}"></div></div><div class="freq-pct">${rt}%</div></div><span class="fbadge ${bc}">${bt}</span></div>`;
        }).join('')}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">⚠️ 알레르기 식품 노출</div>
        <div class="chart-sub">급식 메뉴에 등장한 알레르기 유발 식품 횟수</div>
        <div class="ntr-freq-grid" id="ael">${Object.entries(ac).sort((a,b) => b[1] - a[1]).slice(0,10).map(([n,cnt]) => {
          const im = MA.includes(Number(n));
          const maxCnt = Object.values(ac)[0];
          return `<div class="freq-item"><div class="freq-name">${im?'⚠️ ':''}${AM[n]||n+'번'}</div><div class="freq-bar-row"><div class="freq-bar-wrap"><div class="freq-bar-fill" style="width:${(cnt/maxCnt*100)}%;background:var(--red)"></div></div><div class="freq-pct">${cnt}회</div></div></div>`;
        }).join('')}</div>
      </div>
    `;
    
    CHARTS.cal = new Chart(document.getElementById('cc'), {
      type: 'line',
      data: {
        labels: calByDate.map(d => `${d.date.slice(6)}일`),
        datasets: [{
          label: '일별 칼로리',
          data: calByDate.map(d => d.cal),
          borderColor: '#ffd60a',
          backgroundColor: 'rgba(255,214,10,.08)',
          tension: .4,
          pointRadius: 3,
          pointBackgroundColor: '#ffd60a',
          fill: true
        }, {
          label: '권장 2600Kcal',
          data: calByDate.map(() => 2600),
          borderColor: 'rgba(255,107,107,.4)',
          borderDash: [6,4],
          pointRadius: 0,
          fill: false
        }]
      },
      options: {responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'rgba(255,255,255,.6)',font:{family:'Noto Sans KR',size:11}}}}, scales:{x:{ticks:{color:'rgba(255,255,255,.4)',font:{family:'Space Mono',size:9}},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'rgba(255,255,255,.4)',font:{family:'Space Mono',size:9}},grid:{color:'rgba(255,255,255,.05)'}}}}
    });
    
    window._AD = {ntrAvgs, ntrOver, ntrLow, avgCal, dates, ac};
    document.getElementById('slb').style.display = 'none';
    document.getElementById('mlb').style.display = 'inline-block';
  } catch(e) {
    box.innerHTML = `<div class="empty">⚠️ 데이터를 불러오지 못했습니다.<br>${e.message}</div>`;
  }
  document.getElementById('slb').style.display = 'inline-block';
  document.getElementById('mlb').style.display = 'none';
}

function initNavSchoolSelect() {
  const s = document.getElementById('navSido');
  s.innerHTML = '<option value="">시·도</option>' + SIDO_LIST.map(x => `<option value="${x.code}">${x.name}</option>`).join('');
  
  document.getElementById('navSido').value = 'P10';
  document.getElementById('navLevel').value = '고등학교';
  document.getElementById('navSchoolSearch').value = '상산고등학교';
  searchSchoolsRealtime('nav');
  
  const searchInput = document.getElementById('navSchoolSearch');
  searchInput.addEventListener('input', debounce(() => searchSchoolsRealtime('nav'), 300));
  searchInput.addEventListener('focus', () => {
    const dropdown = document.getElementById('navAutocomplete');
    const sido = document.getElementById('navSido').value;
    const level = document.getElementById('navLevel').value;
    if (sido && level) searchSchoolsRealtime('nav');
    else if (dropdown.children.length > 0) dropdown.classList.add('on');
  });
}
function debounce(fn, delay) {
  let timer = null;
  return function(...args) {
    if (timer) clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), delay);
  };
}

async function searchSchoolsRealtime(context) {
  let sido, level, inputEl, dropdownEl;
  if (context === 'nav') {
    sido = document.getElementById('navSido').value;
    level = document.getElementById('navLevel').value;
    inputEl = document.getElementById('navSchoolSearch');
    dropdownEl = document.getElementById('navAutocomplete');
  }
  const query = inputEl.value.trim();
  
  if (!sido) {
    dropdownEl.innerHTML = '<div class="autocomplete-empty">시·도를 먼저 선택해주세요</div>';
    dropdownEl.classList.add('on');
    return;
  }
  
  dropdownEl.innerHTML = '<div class="autocomplete-loading">로딩 중...</div>';
  dropdownEl.classList.add('on');
  
  try {
    let url = `${NEIS_BASE}/schoolInfo?KEY=${NK}&Type=json&pIndex=1&pSize=100&ATPT_OFCDC_SC_CODE=${sido}`;
    if (query.length > 0) url += `&SCHUL_NM=${encodeURIComponent(query)}`;
    if (level) url += `&SCHUL_KND_SC_NM=${encodeURIComponent(level)}`;
    
    const res = await fetch(url);
    const j = await res.json();
    
    if (j.RESULT) {
      dropdownEl.innerHTML = `<div class="autocomplete-empty">${j.RESULT.MESSAGE || '검색 결과가 없습니다'}</div>`;
      dropdownEl.classList.add('on');
      return;
    }
    if (!j.schoolInfo) {
      dropdownEl.innerHTML = '<div class="autocomplete-empty">검색 결과가 없습니다</div>';
      return;
    }
    const rows = j.schoolInfo[1]?.row || [];
    if (rows.length === 0) {
      dropdownEl.innerHTML = '<div class="autocomplete-empty">검색 결과가 없습니다</div>';
      return;
    }
    dropdownEl.innerHTML = rows.map(r => `<div class="autocomplete-item" data-atpt="${sido}" data-code="${r.SD_SCHUL_CODE}" data-name="${r.SCHUL_NM}" onclick="selectSchool(this, '${context}')">${r.SCHUL_NM}</div>`).join('');
  } catch(e) {
    dropdownEl.innerHTML = '<div class="autocomplete-empty">검색 중 오류가 발생했습니다</div>';
  }
}

function selectSchool(el, context) {

}

function tgA(n, el) {
  const i = MA.indexOf(n);
  if (i > -1) MA.splice(i, 1);
  else MA.push(n);
  localStorage.setItem('my_allergies', JSON.stringify(MA));
  el.classList.toggle('selected');
  loadToday();
}
