<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070709">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="상산급식">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<meta name="msapplication-TileColor" content="#070709">
<title>상산고 급식 영양 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="grid"></div>
<div class="orb" id="o1"></div>
<div class="orb" id="o2"></div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">설정</div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
    <button class="import-btn" onclick="document.getElementById('importFile').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
      파일에서 급식 불러오기
    </button>
    <div class="modal-label">NEIS API KEY *</div>
    <input class="modal-input" id="ni" placeholder="NEIS API 키" type="password">
    <div class="modal-label">Claude API KEY (AI 분석용 — 선택)</div>
    <input class="modal-input" id="ci" placeholder="sk-ant-... (없으면 비워두세요)" type="password">
    <div class="current-school">
      <span>현재 학교: <b id="currentSchoolName">상산고등학교</b></span>
      <button class="school-btn" onclick="toggleSchoolPanel()">학교 변경</button>
    </div>
    <div class="school-panel" id="schoolPanel">
      <div class="school-select">
        <label>시·도 교육청</label>
        <select id="sidoSelect" onchange="loadSchoolList()"></select>
      </div>
      <div class="school-select">
        <label>학교급</label>
        <select id="levelSelect" onchange="loadSchoolList()">
          <option value="">전체</option>
          <option value="초등학교">초등학교</option>
          <option value="중학교">중학교</option>
          <option value="고등학교">고등학교</option>
        </select>
      </div>
      <div class="school-select">
        <label>학교명 (입력 없으면 전체 목록)</label>
        <input type="text" id="schoolSearchInput" placeholder="학교명 입력 (공백=전체 목록)" autocomplete="off" oninput="filterSchoolList()">
        <select id="schoolSelect" size="8" onchange="selectSchoolFromList()">
          <option value="">시·도와 학교급을 먼저 선택해주세요</option>
        </select>
        <div id="schoolListLoading" style="display:none;padding:8px;text-align:center;color:var(--muted);font-size:11px">학교 목록 로딩 중...</div>
      </div>
      <button class="modal-btn" style="margin-bottom:8px" onclick="applySchool()">학교 변경 적용</button>
      <button class="school-btn" style="width:100%;padding:10px" onclick="toggleSchoolPanel()">취소</button>
    </div>
    <button class="modal-btn" id="saveBtn" onclick="saveKeys()">저장하고 시작하기</button>
    <button class="school-btn" style="width:100%;margin-top:8px;padding:10px;background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:10px;color:var(--red)" onclick="doClearCache()">🗑 캐시 지우기</button>
    <div class="modal-note">API 키와 학교 정보는 localStorage에만 저장됩니다.</div>
  </div>
</div>

<nav>
  <div class="nav-logo"><div class="nav-dot"></div>상산고 급식 분석</div>
  <div style="display:flex;align-items:center;gap:8px">
    <select id="navSido" onchange="onNavSidoChange()">
      <option value="">시·도</option>
    </select>
    <select id="navLevel" onchange="onNavLevelChange()">
      <option value="">학교급</option>
      <option value="초등학교">초</option>
      <option value="중학교">중</option>
      <option value="고등학교">고</option>
    </select>
    <div class="school-search-wrap">
      <input type="text" id="navSchoolSearch" class="school-search-input" placeholder="학교명 검색" autocomplete="off">
      <div id="navAutocomplete" class="autocomplete-dropdown"></div>
    </div>
  </div>
  <button class="config-btn" onclick="showModal()">⚙ 설정</button>
</nav>

<main>
  <div class="tabs">
    <button class="tab on" onclick="sw('today',this)">오늘 급식</button>
    <button class="tab" onclick="sw('stats',this)">월간 통계</button>
    <button class="tab" onclick="sw('allergy',this)">알레르기</button>
    <button class="tab" onclick="sw('report',this)">학부모 리포트</button>
  </div>

  <div id="tab-today">
    <div class="date-row">
      <button class="date-btn" onclick="cd(-1)">← 전날</button>
      <input class="date-input" type="date" id="dp" onchange="loadToday()">
      <button class="date-btn" onclick="cd(1)">다음날 →</button>
    </div>
    <div id="today-box"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>

  <div id="tab-stats" style="display:none">
    <div class="month-row">
      <button class="month-btn" onclick="cm(-1)">← 이전달</button>
      <div class="month-display" id="md"></div>
      <button class="month-btn" onclick="cm(1)">다음달 →</button>
    </div>
    <div class="week-btn-row">
      <button class="week-btn" id="wb1" onclick="loadWeek(1)">1주차</button>
      <button class="week-btn" id="wb2" onclick="loadWeek(2)">2주차</button>
      <button class="week-btn" id="wb3" onclick="loadWeek(3)">3주차</button>
      <button class="week-btn" id="wb4" onclick="loadWeek(4)">4주차</button>
    </div>
    <div id="stats-box"><div class="empty">주차를 선택하여 분석을 진행하세요.</div></div>
  </div>

  <div id="tab-allergy" style="display:none">
    <div class="allergy-section">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">내 알레르기 설정</div>
      <div style="font-size:12px;color:var(--muted);font-weight:300;margin-bottom:16px">선택하면 급식 메뉴에 경고 표시가 나타납니다</div>
      <div class="allergy-grid" id="ag"></div>
    </div>
  </div>

  <div id="tab-report" style="display:none">
    <div id="report-box"><div class="loading-wrap"><div class="spinner"></div></div></div>
  </div>
</main>

<script src="js/app.js"></script>
</body>
</html>
